services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: careguide_api
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DatabaseConnection: Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - care-guide-api-network

  db:
    image: postgres:18-alpine
    container_name: careguide_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - '${DB_EXTERNAL_PORT}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - care-guide-api-network

  db_test:
    image: postgres:18-alpine
    container_name: careguide_db_tests
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TEST_DB_USER}
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD}
      POSTGRES_DB: ${TEST_DB_NAME}
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - postgres-tests-data:/var/lib/postgresql
    ports:
      - '${TEST_DB_EXTERNAL_PORT}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${TEST_DB_USER} -d ${TEST_DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - care-guide-api-network

networks:
  care-guide-api-network:
    driver: bridge

volumes:
  postgres-data:
  postgres-tests-data:
